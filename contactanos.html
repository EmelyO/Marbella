<body>
    <header>
        <div class="encabezado">
            <h1 class="titulo"> Marbella's Beauty Center</h1>

        <div class="Menu">
            <a href="index.html">
                <h2>Inicio</h2>

            <a href="nosotros.html">

            </a>
            <a href="contactanos.html">

            </a>
        </div>
    </header>
    <Main class="contacto">
        <div class="formulario">
            <h2>Agendar Cita</h2>
            <form action="#">
                <label>Nombre:</label>
                <input type="text">
                <label>Correo:</label>
                <input type="email">
                <label>Celular:</label>
                <input type="number">
                <label>Servicio a realizar:</label>
                <input type="text">
                <label>Comentarios adicionales:</label>
                <textarea rows="4"></textarea>
                <button>Enviar</button>
            </form>
        </div>
        <div class="maps">
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3783.493391820986!2d-69.97889322408328!3d18.506592982584284!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8eaf8a49cfaa9e9d%3A0x5b228ed1e7fd4ba!2sMarbella%E2%80%99s%20Beauty%20Center!5e0!3m2!1ses-419!2sdo!4v1773710221074!5m2!1ses-419!2sdo"
                width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
                referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
    </Main>

      <footer>
